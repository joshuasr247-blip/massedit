version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - massedit-storage:/app/storage
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MASSEDIT_STORAGE_PATH=/app/storage
      - MASSEDIT_MAX_CONCURRENT_RENDERS=3
      - MASSEDIT_MAX_OUTPUT_COUNT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  massedit-storage:
